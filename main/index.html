<!DOCTYPE html>
<html lang="pt-pt">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Battle! - Commander</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="main-container">
            <header>
                <h1>⚔️ BATTLE ⚔️</h1>
                <p class="subtitle">FIGHT!</p>
            </header>

            <main class="game-area">
                <div class="battle-lane">
                    <button class="panel player-slot", id="player-slot1"></button>
                    <button class="panel enemy-slot", id="enemy-slot1"></button>
                </div>

                <div class="battle-lane">
                    <button class="panel player-slot", id="player-slot2"></button>
                    <button id="fight-btn">VS</button>
                    <button class="panel enemy-slot", id="enemy-slot2"></button>
                </div>

                <div class="battle-lane">
                    <button class="panel player-slot", id="player-slot3"></button>
                    <button class="panel enemy-slot", id="enemy-slot3"></button>
                </div>

                <div id="result-area" style="margin-top: 30px; text-align: center; font-size: 1.4em;"></div>
            </main>

            <footer class="footer-area">
                <div class="unit-list">
                    <button class="unit-slot" data-icon="🔥">🔥</button>
                    <button class="unit-slot" data-icon="💧">💧</button>
                    <button class="unit-slot" data-icon="🌪️">🌬️</button>
                    <button class="unit-slot", id="unit-slot4"></button>
                    <button class="unit-slot", id="unit-slot5"></button>
                </div>
            </footer>
        </div>
        <script src="index.js"></script>
    </body>
</html>
